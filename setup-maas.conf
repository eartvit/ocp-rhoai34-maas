###############################################################################
# setup-maas.conf
#
# MaaS add-on setup for an existing clean OpenShift/RHOAI 3.4 baseline.
#
# This script is additive:
# - It expects setup-cluster.sh baseline to be complete.
# - It does NOT install the base cluster operators except optional MaaS-specific
#   observability components.
# - It does NOT create MaaSSubscription or MaaSAuthPolicy objects by default.
# - It uses CloudNativePG for MaaS PostgreSQL.
# - It uses kserve.rawDeploymentServiceConfig=Headed.
#
# IMPORTANT:
# Never use kserve.rawDeploymentServiceConfig=Headless on OpenShift/OpenShift AI.
# It breaks route behavior. Always use Headed.
###############################################################################

###############################################################################
# Runtime / tracker behavior
###############################################################################

# reset=true only removes setup-maas.tracker.json.
# It does not delete cluster resources.
# Example:
#   reset=true ./setup-maas.sh

MAAS_STOP_ON_PREFLIGHT_FAILURE=true
MAAS_VERBOSE=true

###############################################################################
# Existing baseline expectations
###############################################################################

REQUIRED_OPENSHIFT_MINOR="4.20"
REQUIRED_RHOAI_CSV_REGEX="^rhods-operator\\.3\\.4\\."
REQUIRED_RHCL_CSV="rhcl-operator.v1.3.3"

RHOAI_OPERATOR_NAMESPACE="redhat-ods-operator"
RHOAI_APPLICATIONS_NAMESPACE="redhat-ods-applications"
RHOAI_MONITORING_NAMESPACE="redhat-ods-monitoring"

DSCI_NAME="default-dsci"
DSC_NAME="default-dsc"

KUADRANT_NAMESPACE="kuadrant-system"
KUADRANT_NAME="kuadrant"

CNPG_OPERATOR_NAMESPACE="openshift-operators"
CNPG_SUBSCRIPTION_NAME="cloudnative-pg"

GPU_REQUIRED=true
GPU_RESOURCE_NAME="nvidia.com/gpu"

###############################################################################
# Observability / monitoring
###############################################################################

# MaaS base usage metrics require User Workload Monitoring.
ENABLE_USER_WORKLOAD_MONITORING=true

# Optional MaaS observability dashboard path.
# We enable this because the dashboard flag observabilityDashboard is enabled.
MAAS_ENABLE_OBSERVABILITY=true

# Optional install of Cluster Observability Operator.
# If already installed, script should reuse it.
MAAS_INSTALL_CLUSTER_OBSERVABILITY_OPERATOR=true
CLUSTER_OBSERVABILITY_OPERATOR_NAMESPACE="openshift-cluster-observability-operator"
CLUSTER_OBSERVABILITY_OPERATOR_PACKAGE="cluster-observability-operator"
CLUSTER_OBSERVABILITY_OPERATOR_CHANNEL="stable"
CLUSTER_OBSERVABILITY_OPERATOR_SOURCE="redhat-operators"
CLUSTER_OBSERVABILITY_OPERATOR_SUBSCRIPTION_NAME="cluster-observability-operator"
CLUSTER_OBSERVABILITY_OPERATORGROUP_MODE="all"

# Required by the RHOAI 3.4 observability stack.
# Use Red Hat Operator packages, not Community Operator packages.
MAAS_INSTALL_TEMPO_OPERATOR=true
TEMPO_OPERATOR_NAMESPACE="openshift-tempo-operator"
TEMPO_OPERATOR_PACKAGE="tempo-product"
TEMPO_OPERATOR_CHANNEL="stable"
TEMPO_OPERATOR_SOURCE="redhat-operators"
TEMPO_OPERATOR_SUBSCRIPTION_NAME="tempo-product"
TEMPO_OPERATOR_OPERATORGROUP_MODE="all"

MAAS_INSTALL_OPENTELEMETRY_OPERATOR=true
OPENTELEMETRY_OPERATOR_NAMESPACE="openshift-opentelemetry-operator"
OPENTELEMETRY_OPERATOR_PACKAGE="opentelemetry-product"
OPENTELEMETRY_OPERATOR_CHANNEL="stable"
OPENTELEMETRY_OPERATOR_SOURCE="redhat-operators"
OPENTELEMETRY_OPERATOR_SUBSCRIPTION_NAME="opentelemetry-product"
OPENTELEMETRY_OPERATOR_OPERATORGROUP_MODE="all"

# When installing observability operators by CLI, label their namespaces so they
# are monitored by cluster monitoring.
MAAS_LABEL_OBSERVABILITY_OPERATOR_NAMESPACES=true

# Kuadrant observability should be enabled for MaaS usage dashboards.
MAAS_ENABLE_KUADRANT_OBSERVABILITY=true
MAAS_WAIT_FOR_KUADRANT_LIMITADOR_PODMONITOR=true
KUADRANT_LIMITADOR_PODMONITOR_NAME="kuadrant-limitador-monitor"
KUADRANT_LIMITADOR_PODMONITOR_WAIT_TIMEOUT_SECONDS=600

# Official RHOAI observability stack expected in redhat-ods-monitoring.
RHOAI_OBSERVABILITY_STACK_WAIT_TIMEOUT_SECONDS=1800
RHOAI_OBSERVABILITY_STACK_WAIT_INTERVAL_SECONDS=15
MAAS_FORCE_DSCI_RECONCILE_AFTER_OBSERVABILITY_PREREQS=true
MAAS_CLEANUP_LEGACY_PERSES_PROXY=true

# MaaS Usage dashboard telemetry. captureUser must be true because the Usage
# dashboard queries filter on user!="".
MAAS_ENABLE_TENANT_TELEMETRY=true
MAAS_TELEMETRY_CAPTURE_ORGANIZATION=true
MAAS_TELEMETRY_CAPTURE_USER=true
MAAS_TELEMETRY_CAPTURE_GROUP=false
MAAS_TELEMETRY_CAPTURE_MODEL_USAGE=true
MAAS_WAIT_FOR_TELEMETRY_POLICY=true
MAAS_TELEMETRY_POLICY_NAMESPACE="openshift-ingress"
MAAS_TELEMETRY_POLICY_NAME="maas-telemetry"
MAAS_TENANT_TELEMETRY_WAIT_TIMEOUT_SECONDS=600

# User workload monitoring storage knobs.
# Keep modest defaults for demo/sandbox.
UWM_PROMETHEUS_RETENTION="72h"
UWM_PROMETHEUS_STORAGE_SIZE="40Gi"
UWM_PROMETHEUS_STORAGE_CLASS="gp3-csi"

###############################################################################
# MaaS PostgreSQL via CloudNativePG
###############################################################################

MAAS_DB_ENABLED=true

MAAS_DB_NAMESPACE="maas-db"
MAAS_DB_CLUSTER_NAME="maas"
MAAS_DB_INSTANCES=2

MAAS_DB_NAME="maas"
MAAS_DB_USER="maas"

MAAS_DB_STORAGE_CLASS="gp3-csi"
MAAS_DB_STORAGE_SIZE="10Gi"

MAAS_DB_CPU_REQUEST="200m"
MAAS_DB_MEMORY_REQUEST="256Mi"
MAAS_DB_CPU_LIMIT="1"
MAAS_DB_MEMORY_LIMIT="2Gi"

# Leave empty to let CNPG/operator default its PostgreSQL image.
# If needed later:
# MAAS_DB_IMAGE="ghcr.io/cloudnative-pg/postgresql:16"
MAAS_DB_IMAGE=""

# Secret to create for RHOAI MaaS.
MAAS_DB_CONFIG_SECRET_NAMESPACE="redhat-ods-applications"
MAAS_DB_CONFIG_SECRET_NAME="maas-db-config"

# Script should discover the CNPG generated app secret if possible.
# This is the normal CNPG convention for app/user credentials.
MAAS_DB_APP_SECRET_NAME="maas-app"

# Internal service format for CNPG read-write service:
#   <cluster-name>-rw.<namespace>.svc.cluster.local
MAAS_DB_SERVICE_NAME="maas-rw"
MAAS_DB_SERVICE_PORT="5432"

###############################################################################
# Authorino TLS for MaaS
###############################################################################

MAAS_CONFIGURE_AUTHORINO_TLS=true

AUTHORINO_NAMESPACE="kuadrant-system"
AUTHORINO_NAME="authorino"
AUTHORINO_SERVICE_NAME="authorino-authorino-authorization"
AUTHORINO_DEPLOYMENT_NAME="authorino"
AUTHORINO_SERVER_CERT_SECRET_NAME="authorino-server-cert"

# Service annotation used by OpenShift service CA.
AUTHORINO_SERVICE_CA_SECRET_ANNOTATION="service.beta.openshift.io/serving-cert-secret-name"

# Environment variables expected by the Authorino deployment for TLS verification.
AUTHORINO_SSL_CERT_FILE="/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt"
AUTHORINO_REQUESTS_CA_BUNDLE="/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt"
# AUTHORINO_SSL_CERT_FILE="/etc/ssl/certs/openshift-service-ca/service-ca-bundle.crt"
# AUTHORINO_REQUESTS_CA_BUNDLE="/etc/ssl/certs/openshift-service-ca/service-ca-bundle.crt"


###############################################################################
# Gateway API / MaaS gateway
###############################################################################

MAAS_GATEWAY_ENABLED=true

# GatewayClass used by RHOAI MaaS.
MAAS_GATEWAY_CLASS_NAME="data-science-gateway-class"
MAAS_GATEWAY_CLASS_CONTROLLER="openshift.io/gateway-controller/v1"

MAAS_GATEWAY_NAMESPACE="openshift-ingress"
MAAS_GATEWAY_NAME="maas-default-gateway"

# Leave empty to auto-detect apps domain and use:
#   maas.<apps-domain>
# Example:
#   apps.cluster-tvghw.tvghw.sandbox1008.opentlc.com
# gives:
#   maas.apps.cluster-tvghw.tvghw.sandbox1008.opentlc.com
MAAS_APPS_DOMAIN=""
MAAS_HOST=""

# We use an OpenShift Route in front of the Gateway service for the external
# https://maas.apps... endpoint. This matches the working route-based behavior
# from the previous cluster.
MAAS_GATEWAY_USE_ROUTE=true
MAAS_ROUTE_NAME="maas-gateway-route"
MAAS_ROUTE_NAMESPACE="openshift-ingress"
MAAS_ROUTE_TLS_TERMINATION="edge"
MAAS_ROUTE_INSECURE_POLICY="Allow"

# Internal service generated by the OpenShift Gateway implementation.
MAAS_GATEWAY_BACKEND_SERVICE="maas-default-gateway-data-science-gateway-class"
MAAS_GATEWAY_BACKEND_TARGET_PORT="80"

# If MAAS_GATEWAY_USE_ROUTE=false, the script can instead create a cert-manager
# Certificate and configure the Gateway HTTPS listener directly.
MAAS_GATEWAY_CREATE_CERTIFICATE=false
MAAS_GATEWAY_CERTIFICATE_NAME="maas-default-gateway-certificate"
MAAS_GATEWAY_TLS_SECRET_NAME="maas-default-gateway-cert"
MAAS_GATEWAY_CLUSTER_ISSUER="letsencrypt"

# Final external MaaS API base path.
MAAS_API_BASE_PATH="/maas-api"

###############################################################################
# DSCInitialization
###############################################################################

# DSCI already exists from the RHOAI operator in this cluster.
# The script should verify and patch only if necessary.
MAAS_PATCH_DSCI_IF_NEEDED=true

DSCI_APPLICATIONS_NAMESPACE="redhat-ods-applications"
DSCI_MONITORING_MANAGEMENT_STATE="Managed"
DSCI_MONITORING_NAMESPACE="redhat-ods-monitoring"
DSCI_TRUSTED_CA_BUNDLE_MANAGEMENT_STATE="Managed"

# Optional metrics storage for DSCI monitoring block.
# Note: RHOAI 3.4 accepts metrics.storage.size here; retention is configured through monitoring stacks, not DSCI.
DSCI_MONITORING_METRICS_STORAGE_SIZE="5Gi"
DSCI_MONITORING_METRICS_RETENTION="1d"  # retained for compatibility; setup-maas.sh does not patch it into DSCI

###############################################################################
# DataScienceCluster/default-dsc
###############################################################################

MAAS_CREATE_DSC=true
DSC_API_VERSION="datasciencecluster.opendatahub.io/v2"
DSC_NAME="default-dsc"

# Component states.
DSC_COMPONENT_AIPIPELINES="Managed"
DSC_COMPONENT_DASHBOARD="Managed"
DSC_COMPONENT_FEASTOPERATOR="Managed"
DSC_COMPONENT_KSERVE="Managed"
DSC_COMPONENT_KSERVE_MODELS_AS_SERVICE="Managed"
DSC_COMPONENT_KSERVE_NIM="Managed"

# Critical: must be Headed, never Headless.
DSC_COMPONENT_KSERVE_RAW_DEPLOYMENT_SERVICE_CONFIG="Headed"

DSC_COMPONENT_KUEUE="Removed"
DSC_COMPONENT_LLAMASTACKOPERATOR="Managed"
DSC_COMPONENT_MLFLOWOPERATOR="Removed"
DSC_COMPONENT_MODELREGISTRY="Managed"
DSC_COMPONENT_MODELREGISTRY_NAMESPACE="rhoai-model-registries"
DSC_COMPONENT_RAY="Managed"
DSC_COMPONENT_SPARKOPERATOR="Removed"
DSC_COMPONENT_TRAINER="Removed"
DSC_COMPONENT_TRAININGOPERATOR="Removed"
DSC_COMPONENT_TRUSTYAI="Managed"
DSC_COMPONENT_WORKBENCHES="Managed"
DSC_COMPONENT_WORKBENCHES_NAMESPACE="rhods-notebooks"

# TrustyAI/LMEval guardrails.
DSC_TRUSTYAI_LMEVAL_PERMIT_CODE_EXECUTION="deny"
DSC_TRUSTYAI_LMEVAL_PERMIT_ONLINE="deny"

###############################################################################
# Dashboard flags
###############################################################################

MAAS_CONFIGURE_DASHBOARD=true

ODH_DASHBOARD_CONFIG_NAME="odh-dashboard-config"
ODH_DASHBOARD_CONFIG_NAMESPACE="redhat-ods-applications"

DASHBOARD_FLAG_MODEL_AS_SERVICE=true
DASHBOARD_FLAG_GEN_AI_STUDIO=true
DASHBOARD_FLAG_MAAS_AUTH_POLICIES=true
DASHBOARD_FLAG_OBSERVABILITY_DASHBOARD=true
DASHBOARD_FLAG_VLLM_DEPLOYMENT_ON_MAAS=true

# Restart dashboard after config patch.
DASHBOARD_RESTART_AFTER_CONFIG=true
DASHBOARD_DEPLOYMENT_NAME="rhods-dashboard"
DASHBOARD_DEPLOYMENT_NAMESPACE="redhat-ods-applications"

###############################################################################
# MaaS readiness checks
###############################################################################

MAAS_NAMESPACE="models-as-a-service"
MAAS_TENANT_NAME="default-tenant"

MAAS_API_DEPLOYMENT_NAME="maas-api"

# CRDs expected after DSC/MaaS reconciliation.
MAAS_WAIT_FOR_CRDS=true
MAAS_CRD_WAIT_TIMEOUT_SECONDS=1800

MAAS_READY_TIMEOUT_SECONDS=2400
MAAS_READY_INTERVAL_SECONDS=30

# Health validation.
MAAS_VALIDATE_API_HEALTH=true
MAAS_HEALTH_ENDPOINT_PATH="/maas-api/health"
MAAS_HEALTH_TIMEOUT_SECONDS=600

###############################################################################
# Optional MaaS subscriptions / auth policies
###############################################################################

# Do not create by default. User will create subscriptions/policies manually.
MAAS_CREATE_DEFAULT_SUBSCRIPTIONS=false
MAAS_CREATE_DEFAULT_AUTH_POLICIES=false

###############################################################################
# Optional hardware profile support
###############################################################################

# The baseline GPU MachineSet should use the NVIDIA-compatible taint:
#   nvidia.com/gpu=present:NoSchedule
#
# The hardware profile should select:
#   gpu.openshift.ai/accelerator=nvidia
#
# This script can create a hardware profile later, but default is false because
# we should first verify the MaaS platform itself.
MAAS_CREATE_GPU_HARDWARE_PROFILE=false
MAAS_GPU_HARDWARE_PROFILE_NAME="nvidia-gpu"
MAAS_GPU_HARDWARE_PROFILE_DISPLAY_NAME="NVIDIA GPU"
MAAS_GPU_SELECTOR_KEY="gpu.openshift.ai/accelerator"
MAAS_GPU_SELECTOR_VALUE="nvidia"
MAAS_GPU_TOLERATION_KEY="nvidia.com/gpu"
MAAS_GPU_TOLERATION_OPERATOR="Exists"
MAAS_GPU_TOLERATION_EFFECT="NoSchedule"

###############################################################################
# Validation output
###############################################################################

MAAS_PRINT_VALIDATION_SUMMARY=true
MAAS_PRINT_VERBOSE_OPERATOR_CSVS=false

CLUSTER_MONITORING_PROMETHEUS_RETENTION="168h"
CLUSTER_MONITORING_STORAGE_SIZE="40Gi"
CLUSTER_MONITORING_STORAGE_CLASS="gp3-csi"


# Kuadrant AuthPolicy reconciliation for MaaS UI/API key flow
MAAS_RECONCILE_KUADRANT_AUTHPOLICIES=true
KUADRANT_OPERATOR_DEPLOYMENT="kuadrant-operator-controller-manager"
KUADRANT_OPERATOR_ROLLOUT_TIMEOUT="300s"
MAAS_API_AUTHPOLICY_NAMESPACE="redhat-ods-applications"
MAAS_API_AUTHPOLICY_NAME="maas-api-auth-policy"
MAAS_GATEWAY_AUTHPOLICY_NAMESPACE="openshift-ingress"
MAAS_GATEWAY_AUTHPOLICY_NAME="gateway-default-auth"
MAAS_AUTHPOLICY_WAIT_TIMEOUT_SECONDS=600
MAAS_AUTHPOLICY_WAIT_INTERVAL_SECONDS=15
