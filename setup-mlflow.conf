###############################################################################
# setup-mlflow.conf
#
# Production-oriented MLflow setup for Red Hat OpenShift AI Self-Managed 3.4.
#
# Uses:
#   - RHOAI MLflow Operator component
#   - CloudNativePG PostgreSQL backend store
#   - ODF/NooBaa ObjectBucketClaim for S3-compatible artifact storage
#
# Important:
#   RHOAI MLflow pods use PostgreSQL TLS verification. This config/script adds
#   the CNPG MLflow DB CA into DSCI trustedCABundle.customCABundle so MLflow
#   DB migrations can verify PostgreSQL TLS.
###############################################################################

# Existing RHOAI objects
DSC_NAME="default-dsc"
DSCI_NAME="default-dsci"
RHOAI_OPERATOR_NAMESPACE="redhat-ods-operator"
RHOAI_APPLICATIONS_NAMESPACE="redhat-ods-applications"
REQUIRED_RHOAI_CSV_REGEX="^rhods-operator\.3\.4\."

# MLflow operator / CR
MLFLOW_ENABLE_OPERATOR_COMPONENT=true
MLFLOW_API_VERSION="mlflow.opendatahub.io/v1"
MLFLOW_NAME="mlflow"
MLFLOW_NAMESPACE="redhat-ods-applications"
MLFLOW_REPLICAS=2
MLFLOW_SERVE_ARTIFACTS=true
MLFLOW_ARTIFACT_PATH="artifacts"
MLFLOW_DB_SECRET_NAME="mlflow-db-credentials"
MLFLOW_DB_SECRET_KEY="backend-store-uri"
MLFLOW_S3_SECRET_NAME="mlflow-s3-credentials"
MLFLOW_WAIT_TIMEOUT_SECONDS=1800
MLFLOW_WAIT_INTERVAL_SECONDS=20

# PostgreSQL via CloudNativePG
MLFLOW_DB_ENABLED=true
MLFLOW_DB_NAMESPACE="mlflow-db"
MLFLOW_DB_CLUSTER_NAME="mlflow"
MLFLOW_DB_NAME="mlflow"
MLFLOW_DB_USER="mlflow"
MLFLOW_DB_INSTANCES=2
MLFLOW_DB_STORAGE_SIZE="20Gi"
MLFLOW_DB_STORAGE_CLASS="gp3-csi"
MLFLOW_DB_CPU_REQUEST="250m"
MLFLOW_DB_MEMORY_REQUEST="512Mi"
MLFLOW_DB_CPU_LIMIT="2"
MLFLOW_DB_MEMORY_LIMIT="2Gi"
MLFLOW_DB_SERVICE_PORT="5432"
MLFLOW_DB_SSLMODE="require"
# Leave empty to use the CNPG default image.
MLFLOW_DB_IMAGE=""

# Trust CNPG PostgreSQL CA in RHOAI trusted bundle
MLFLOW_DB_TRUST_CNPG_CA=true
MLFLOW_DB_CA_SECRET_NAME="mlflow-ca"
MLFLOW_DB_CA_SECRET_KEY="ca.crt"
MLFLOW_RHOAI_TRUSTED_CA_CONFIGMAP="odh-trusted-ca-bundle"
MLFLOW_RHOAI_TRUSTED_CA_WAIT_TIMEOUT_SECONDS=600
MLFLOW_RHOAI_TRUSTED_CA_WAIT_INTERVAL_SECONDS=15
MLFLOW_RESTART_EXISTING_AFTER_CA_UPDATE=true

# ODF / NooBaa S3-compatible artifact storage
MLFLOW_S3_ENABLED=true
MLFLOW_OBC_NAME="mlflow-artifacts"
MLFLOW_OBC_NAMESPACE="redhat-ods-applications"
MLFLOW_OBC_STORAGE_CLASS="openshift-storage.noobaa.io"
MLFLOW_OBC_GENERATE_BUCKET_NAME="mlflow-artifacts"
MLFLOW_OBC_WAIT_TIMEOUT_SECONDS=900
MLFLOW_OBC_WAIT_INTERVAL_SECONDS=15

# For in-cluster NooBaa, HTTP avoids needing to inject CA bundles into MLflow.
# Set this empty to auto-build from the OBC ConfigMap BUCKET_HOST/BUCKET_PORT.
MLFLOW_S3_ENDPOINT_URL="http://s3.openshift-storage.svc:80"
MLFLOW_S3_REGION="us-east-1"

# Optional: create per-project MLflowConfig resources.
# Default is false because the global MLflow server with serveArtifacts=true is cleaner.
MLFLOW_CREATE_PROJECT_CONFIGS=false
MLFLOW_PROJECT_NAMES=""
MLFLOW_PROJECT_ARTIFACT_SECRET_NAME="mlflow-artifact-connection"
MLFLOW_PROJECT_ARTIFACT_ROOT_PATH="mlflow-artifacts"

# Dashboard
DASHBOARD_RESTART_AFTER_MLFLOW=true
DASHBOARD_DEPLOYMENT_NAMESPACE="redhat-ods-applications"
DASHBOARD_DEPLOYMENT_NAME="rhods-dashboard"

# Validation
MLFLOW_PRINT_VALIDATION_SUMMARY=true
