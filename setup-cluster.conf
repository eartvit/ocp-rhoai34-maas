###############################################################################
# setup-cluster.conf
#
# Clean baseline OpenShift/RHOAI 3.4 cluster setup.
#
# Important behavior:
# - setup-cluster.sh applies the existing HTPASSWD_PATH file as-is.
# - It does NOT generate or overwrite htpasswd passwords.
# - Authorino is NOT installed directly by this script.
# - RHCL is installed pinned to 1.3.3 and OLM/RHCL resolves dependencies.
# - DSCI, DSC, and MaaS resources are NOT created here.
###############################################################################

###############################################################################
# Cluster login
###############################################################################

API_ENDPOINT="https://api.cluster-x59d7.x59d7.sandbox4109.opentlc.com:6443"

KUBEADMIN_USER="kubeadmin"
KUBEADMIN_PASSWORD="WyHdi-3EYae-iAMoz-sdbWu"

INSECURE_SKIP_TLS_VERIFY=true

###############################################################################
# Tracker/reset behavior
###############################################################################

# reset=true only removes setup-cluster.tracker.json.
# It does not delete cluster resources.
# Example:
#   reset=true ./setup-cluster.sh

###############################################################################
# OpenShift namespaces
###############################################################################

OPENSHIFT_CONFIG_NAMESPACE="openshift-config"
MACHINESET_NAMESPACE="openshift-machine-api"

###############################################################################
# HTPasswd / local cluster admin
#
# This script must NOT generate or overwrite passwords.
# It only applies this existing file into the htpasswd-secret.
###############################################################################

CONFIGURE_HTPASSWD=true

# Existing local file. Must already contain the users you want.
HTPASSWD_PATH="${SCRIPT_DIR}/users.htpasswd"

SECRET_NAME="htpasswd-secret"
IDP_NAME="local-users"

# Used only for validation/logging and cluster-admin group binding.
# The password is NOT read from this config and is NOT generated by the script.
ADMIN_USER="clusteradmin"
GROUP_NAME="mylocaladmins"

###############################################################################
# OperatorGroup safety
#
# false = do not delete/replace existing OperatorGroups automatically.
# true  = allow script to delete incompatible OperatorGroups.
###############################################################################

OPERATORGROUP_REPLACE_INCOMPATIBLE=false

###############################################################################
# Generic OLM settings
###############################################################################

DEFAULT_OPERATOR_SOURCE_NAMESPACE="openshift-marketplace"
OPERATOR_INSTALLPLAN_APPROVAL="Automatic"

OPERATOR_WAIT_TIMEOUT_SECONDS=2400
CRD_WAIT_TIMEOUT_SECONDS=900
CR_WAIT_TIMEOUT_SECONDS=2400

###############################################################################
# Worker MachineSet scaling
#
# The script detects the running master/control-plane node region and scales
# worker-like MachineSets in the same region.
###############################################################################

SCALE_WORKER_MACHINESETS=true
WORKER_MACHINESET_TARGET_REPLICAS=3
WORKER_MACHINESET_ROOT_VOLUME_SIZE_GB=1000

# Leave empty if you do not want to patch the existing worker instance type.
# Example if needed:
#WORKER_MACHINESET_PREFERRED_INSTANCE_TYPE=""
WORKER_MACHINESET_PREFERRED_INSTANCE_TYPE="m6a.4xlarge"


WORKER_MACHINESET_WAIT_TIMEOUT_SECONDS=2400
WORKER_MACHINESET_WAIT_INTERVAL_SECONDS=30

###############################################################################
# cert-manager Operator for Red Hat OpenShift
###############################################################################

CERT_MANAGER_ENABLED=true
CERT_MANAGER_DISPLAY_NAME_HINT="cert-manager Operator for Red Hat OpenShift"
CERT_MANAGER_NAMESPACE="cert-manager-operator"
CERT_MANAGER_PACKAGE_CANDIDATES="openshift-cert-manager-operator"
CERT_MANAGER_CHANNEL="stable-v1"
CERT_MANAGER_SOURCE="redhat-operators"
CERT_MANAGER_SUBSCRIPTION_NAME="openshift-cert-manager-operator"

# Repo-style cert-manager CA/trust/API certificate setup
CERT_MANAGER_CLUSTER_TRUST_ENABLED=true
CERT_MANAGER_API_HOST=""
CERT_MANAGER_SELFSIGNED_ISSUER_NAME="selfsigned-issuer"
CERT_MANAGER_CA_NAMESPACE="cert-manager"
CERT_MANAGER_CA_CERTIFICATE_NAME="selfsigned-ca"
CERT_MANAGER_CA_COMMON_NAME="selfsigned-ca"
CERT_MANAGER_CA_SECRET_NAME="cert-manager-ca"
CERT_MANAGER_CA_ISSUER_NAME="ca-issuer"
CERT_MANAGER_API_CERTIFICATE_NAME="openshift-api"
CERT_MANAGER_API_SECRET_NAME="openshift-api"
CERT_MANAGER_USER_CA_BUNDLE_NAME="user-ca-bundle"
CERT_MANAGER_CERT_WAIT_TIMEOUT="300s"

###############################################################################
# Red Hat Connectivity Link / Kuadrant
#
# Important:
# - RHCL is pinned to 1.3.3.
# - Authorino is NOT installed directly here.
# - RHCL/OLM dependency resolution should install Authorino/DNS/Limitador.
###############################################################################

RHCL_ENABLED=true
RHCL_DISPLAY_NAME_HINT="Red Hat Connectivity Link"
RHCL_OPERATOR_NAMESPACE="kuadrant-system"

# Package name can vary by catalog exposure; keep the likely names here.
RHCL_PACKAGE_CANDIDATES="rhcl-operator,kuadrant-operator"
RHCL_CHANNEL="stable"
RHCL_SOURCE="redhat-operators"
RHCL_SUBSCRIPTION_NAME="rhcl-operator"

# Strict pin to RHCL 1.3.3.
RHCL_REQUIRED_CSV_REGEX="^rhcl-operator\\.v1\\.3\\.3$"

# Manual is safer for pinned RHCL because it avoids blindly approving newer plans.
RHCL_INSTALLPLAN_APPROVAL="Manual"

# Visibility check only. The script does not install dependency operators directly.
RHCL_VALIDATE_DEPENDENCY_CSVS=true

# Kuadrant instance
CREATE_KUADRANT_INSTANCE=true
KUADRANT_NAMESPACE="kuadrant-system"
KUADRANT_INSTANCE_NAME="kuadrant"

###############################################################################
# Leader Worker Set Operator
###############################################################################

LWS_ENABLED=true
LWS_DISPLAY_NAME_HINT="Red Hat Leader Worker Set Operator"
LWS_NAMESPACE="openshift-lws-operator"

LWS_PACKAGE_CANDIDATES="leader-worker-set"
LWS_CHANNEL="stable-v1.0"
LWS_SOURCE="redhat-operators"
LWS_SUBSCRIPTION_NAME="leader-worker-set"

CREATE_LWS_INSTANCE=true
LWS_INSTANCE_NAME="cluster"

###############################################################################
# JobSet Operator
###############################################################################

JOBSET_ENABLED=true
JOBSET_DISPLAY_NAME_HINT="JobSet Operator"
JOBSET_NAMESPACE="openshift-jobset-operator"

JOBSET_PACKAGE_CANDIDATES="job-set"
JOBSET_CHANNEL="stable-v1.0"
JOBSET_SOURCE="redhat-operators"
JOBSET_SUBSCRIPTION_NAME="job-set"

CREATE_JOBSET_INSTANCE=true
JOBSET_INSTANCE_NAME="cluster"

###############################################################################
# OpenShift Pipelines
###############################################################################

PIPELINES_ENABLED=true
PIPELINES_DISPLAY_NAME_HINT="Red Hat OpenShift Pipelines"
PIPELINES_NAMESPACE="openshift-operators"

PIPELINES_PACKAGE_CANDIDATES="openshift-pipelines-operator-rh"
PIPELINES_CHANNEL="latest"
PIPELINES_SOURCE="redhat-operators"
PIPELINES_SUBSCRIPTION_NAME="openshift-pipelines-operator-rh"

###############################################################################
# ODF / standalone NooBaa MCG
###############################################################################

ODF_ENABLED=true
ODF_DISPLAY_NAME_HINT="OpenShift Data Foundation"
ODF_NAMESPACE="openshift-storage"

ODF_PACKAGE_CANDIDATES="odf-operator"
ODF_CHANNEL="stable-4.20"
ODF_SOURCE="redhat-operators"
ODF_SUBSCRIPTION_NAME="odf-operator"

NOOBAA_ENABLED=true
NOOBAA_NAME="noobaa"

# Leave empty to auto-detect default StorageClass.
ODF_MCG_STORAGE_CLASS=""

NOOBAA_DB_CPU_REQUEST="100m"
NOOBAA_DB_MEMORY_REQUEST="256Mi"
NOOBAA_CORE_CPU_REQUEST="100m"
NOOBAA_CORE_MEMORY_REQUEST="512Mi"
NOOBAA_PV_SIZE="50Gi"

ODF_ENABLE_CONSOLE_PLUGIN=true
ODF_CONSOLE_PLUGIN_NAME="odf-console"

###############################################################################
# Crunchy Postgres Operator
#
# Keep Crunchy, not CloudNativePG.
# Install cluster-wide so MaaS can later create/use Postgres resources in
# namespaces outside the operator namespace.
###############################################################################

CRUNCHY_ENABLED=false
CRUNCHY_DISPLAY_NAME_HINT="Crunchy Postgres Operator"
CRUNCHY_NAMESPACE="postgres-operator"

CRUNCHY_PACKAGE_CANDIDATES="postgresoperator,crunchy-postgres-operator"
CRUNCHY_CHANNEL="v5"
CRUNCHY_SOURCE="redhat-operators"
CRUNCHY_SUBSCRIPTION_NAME="postgresoperator"

CRUNCHY_INSTALL_CLUSTERWIDE=true

###############################################################################
# Node Feature Discovery Operator
###############################################################################

NFD_ENABLED=true
NFD_DISPLAY_NAME_HINT="Node Feature Discovery Operator"
NFD_NAMESPACE="openshift-nfd"

NFD_PACKAGE_CANDIDATES="nfd"
NFD_CHANNEL="stable"
NFD_SOURCE="redhat-operators"
NFD_SUBSCRIPTION_NAME="nfd"

CREATE_NFD_INSTANCE=true
NFD_INSTANCE_NAME="nfd-instance"

###############################################################################
# NVIDIA GPU Operator
###############################################################################

NVIDIA_ENABLED=true
NVIDIA_DISPLAY_NAME_HINT="NVIDIA GPU Operator"
NVIDIA_NAMESPACE="nvidia-gpu-operator"

NVIDIA_PACKAGE_CANDIDATES="gpu-operator-certified"
NVIDIA_CHANNEL="stable"
NVIDIA_SOURCE="certified-operators"
NVIDIA_SUBSCRIPTION_NAME="gpu-operator-certified"

CREATE_NVIDIA_CLUSTER_POLICY=true
NVIDIA_CLUSTER_POLICY_NAME="gpu-cluster-policy"

###############################################################################
# GPU MachineSet
###############################################################################

GPU_MACHINESET_ENABLED=true

# Leave empty to clone a detected same-region worker MachineSet.
GPU_MACHINESET_SOURCE_NAME=""

# Leave empty to create <source-machineset>-gpu.
GPU_MACHINESET_NAME=""

GPU_MACHINESET_REPLICAS=1
GPU_MACHINESET_INSTANCE_TYPE="g6e.2xlarge"
GPU_MACHINESET_ROOT_VOLUME_SIZE_GB=1000

GPU_MACHINESET_WAIT_TIMEOUT_SECONDS=3600
GPU_MACHINESET_WAIT_INTERVAL_SECONDS=30

# Driver install can take time after the GPU node becomes Ready.
GPU_DRIVER_WAIT_TIMEOUT_SECONDS=3600
GPU_DRIVER_WAIT_INTERVAL_SECONDS=60

###############################################################################
# GPU node isolation
#
# This labels/taints the GPU MachineSet template so GPU nodes are reserved for
# RHOAI/MaaS workloads that tolerate/select them.
###############################################################################

GPU_NODE_ISOLATION_ENABLED=true

GPU_NODE_SELECTOR_LABEL_KEY="gpu.openshift.ai/accelerator"
GPU_NODE_SELECTOR_LABEL_VALUE="nvidia"

GPU_NODE_ROLE_LABEL_KEY="node-role.kubernetes.io/gpu"
GPU_NODE_ROLE_LABEL_VALUE=""

GPU_NODE_TAINT_KEY="nvidia.com/gpu"
GPU_NODE_TAINT_VALUE="present"
GPU_NODE_TAINT_EFFECT="NoSchedule"

###############################################################################
# OpenShift Service Mesh 3 Operator
###############################################################################

SERVICEMESH3_ENABLED=true
SERVICEMESH3_DISPLAY_NAME_HINT="OpenShift Service Mesh 3"
SERVICEMESH3_NAMESPACE="openshift-operators"

SERVICEMESH3_PACKAGE_CANDIDATES="servicemeshoperator3"
SERVICEMESH3_CHANNEL="stable"
SERVICEMESH3_SOURCE="redhat-operators"
SERVICEMESH3_SUBSCRIPTION_NAME="servicemeshoperator3"

###############################################################################
# RHOAI 3.4 Operator baseline only
#
# This script installs the operator only.
# DSCI, DSC, and MaaS are handled later by setup-maas.sh.
###############################################################################

RHOAI_ENABLED=true
RHOAI_DISPLAY_NAME_HINT="Red Hat OpenShift AI"
RHOAI_NAMESPACE="redhat-ods-operator"
RHOAI_APPLICATIONS_NAMESPACE="redhat-ods-applications"

RHOAI_PACKAGE_CANDIDATES="rhods-operator"
RHOAI_CHANNEL="stable-3.4"
RHOAI_SOURCE="redhat-operators"
RHOAI_SUBSCRIPTION_NAME="rhods-operator"

# Leave empty unless you explicitly want to force a starting CSV.
RHOAI_STARTING_CSV=""

# Strictly require RHOAI 3.4.x.
RHOAI_REQUIRED_CSV_REGEX="^rhods-operator\\.3\\.4\\."

# Baseline guardrails.
RHOAI_CREATE_DSCI=false
RHOAI_CREATE_DSC=false

###############################################################################
# MaaS guardrails
#
# MaaS belongs in setup-maas.sh, not setup-cluster.sh.
###############################################################################

MAAS_ENABLED=false
MAAS_CREATE_CRUNCHY_DATABASE=false
MAAS_CREATE_GATEWAY=false
MAAS_CREATE_HTTPROUTE=false
MAAS_CREATE_AUTHPOLICY=false
MAAS_CREATE_DASHBOARD_ROUTE_REPAIR=false

ODF_STORAGECLUSTER_NAME="ocs-storagecluster"
ODF_STORAGECLUSTER_RESOURCE_PROFILE="lean"
NOOBAA_CREATE_TEST_OBC="false"
NOOBAA_TEST_OBC_NAME="first-bucket"
CNPG_ENABLED=true
CNPG_DISPLAY_NAME_HINT="CloudNativePG"
CNPG_NAMESPACE="openshift-operators"
CNPG_PACKAGE_CANDIDATES="cloudnative-pg"
CNPG_CHANNEL="stable-v1"
CNPG_SOURCE="certified-operators"
CNPG_SUBSCRIPTION_NAME="cloudnative-pg"
CNPG_INSTALL_METHOD="olm"
CNPG_MANIFEST_URL="https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.29/releases/cnpg-1.29.1.yaml"
CNPG_UPSTREAM_NAMESPACE="cnpg-system"
CNPG_UPSTREAM_DEPLOYMENT="cnpg-controller-manager"
CNPG_ROLLOUT_TIMEOUT="600s"
